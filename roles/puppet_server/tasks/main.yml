---
- name: Download Puppet 6 release package for Focal
  ansible.legacy.get_url:
    url: https://apt.puppetlabs.com/puppet6-release-focal.deb
    dest: /tmp/puppet6-release-focal.deb
    mode: '0644'
- name: Install Puppet 6 release package for Focal
  ansible.legacy.apt:
    deb: /tmp/puppet6-release-focal.deb
  become: true
- name: Update apt cache
  ansible.legacy.apt:
    update_cache: true
  become: true
- name: Install Puppet Server and supporting packages
  ansible.legacy.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - puppetserver
    - puppetdb
    - puppetdb-termini
    - git
    - tree
  become: true
- name: Enable and start Puppet Server services
  ansible.legacy.service:
    name: "{{ item }}"
    state: started
    enabled: true
  with_items:
    - puppetserver
    - puppetdb
- name: Configure Puppet Server memory
  ansible.legacy.replace:
    path: /etc/default/puppetserver
    # This regex looks for -Xm[sx]<digits>g (e.g., -Xms2g or -Xmx4g)
    # and changes the <digits> part to 1, effectively setting it to 1g.
    # This will affect both -Xms and -Xmx if they are present and match the pattern.
    regexp: '(-Xm[sx])([0-9]+)g'
    replace: '\11g'
  notify: restart puppetserver
- name: Configure Puppet Server settings
  ansible.legacy.template:
    src: templates/puppet.conf.j2
    dest: /etc/puppetlabs/puppet/puppet.conf
    mode: '0644'
  notify: restart puppetserver
- name: Set up autosign configuration
  ansible.legacy.copy:
    content: "*.example.com"
    dest: /etc/puppetlabs/puppet/autosign.conf
    mode: '0644'
